<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - PsyDost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="logo"><i class="fas fa-lock"></i></div>
        <h1>Reset Password</h1>
        <p>Don't worry! It happens. Enter your registered email and we'll send you an OTP to reset your password securely.</p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-container">
        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
        <h2>Forgot Password?</h2>
        <p class="subtitle">Enter your email address to receive a verification code</p>
        <form class="auth-form" data-redirect="otp-verification.html" data-success="OTP sent to your email!">
          <div class="form-group">
            <label class="form-label-custom" for="email">Email Address</label>
            <input type="email" id="email" class="form-control-custom" placeholder="dr.priya@psydost.com" required>
          </div>
          <button type="submit" class="auth-submit"><i class="fas fa-paper-plane"></i> Send OTP</button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
