<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - PsyDost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="logo"><i class="fas fa-user-shield"></i></div>
        <h1>Account Security</h1>
        <p>Regularly updating your password helps protect your account and sensitive patient information.</p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-container">
        <a href="pages/settings.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Settings</a>
        <h2>Change Password</h2>
        <p class="subtitle">Update your account password</p>
        <form class="auth-form" data-redirect="pages/settings.html" data-success="Password changed successfully!">
          <div class="form-group">
            <label class="form-label-custom" for="currentPassword">Current Password</label>
            <div class="input-group-custom">
              <input type="password" id="currentPassword" class="form-control-custom" required>
              <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label-custom" for="newPassword">New Password</label>
            <div class="input-group-custom">
              <input type="password" id="newPassword" class="form-control-custom" required>
              <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
            </div>
            <div class="password-strength">
              <div class="strength-bar"><div class="strength-bar-fill"></div></div>
              <span class="strength-text">Enter a password</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label-custom" for="confirmPassword">Confirm New Password</label>
            <div class="input-group-custom">
              <input type="password" id="confirmPassword" class="form-control-custom" required>
              <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="auth-submit"><i class="fas fa-save"></i> Update Password</button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
