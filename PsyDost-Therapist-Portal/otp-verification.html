<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - PsyDost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="logo"><i class="fas fa-shield-alt"></i></div>
        <h1>Verify Identity</h1>
        <p>We've sent a 6-digit verification code to your registered email address for secure password recovery.</p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-container">
        <a href="forgot-password.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
        <h2>Enter OTP</h2>
        <p class="subtitle">Code sent to <strong>dr.priya@psydost.com</strong></p>
        <form class="auth-form" data-redirect="reset-password.html" data-success="OTP verified successfully!">
          <div class="otp-inputs">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          </div>
          <p class="otp-timer">Resend code in <span>60</span>s</p>
          <a class="resend-link disabled">Resend OTP</a>
          <button type="submit" class="auth-submit mt-3"><i class="fas fa-check"></i> Verify OTP</button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
