<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescriptions - PsyDost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body data-page="prescriptions.html">
  <div class="sidebar-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1035;opacity:0;pointer-events:none;transition:opacity .3s;"></div>
  <div class="app-wrapper">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-header"></div>
      <div class="page-content">
        <div class="breadcrumb-nav"> <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right" style="font-size:0.6rem;"></i> <span class="current">Prescriptions</span> </div>
        <div class="page-header"><div><h2>Prescriptions</h2><p>Manage patient prescriptions and medication notes</p></div>
        <button class="btn-primary-custom" data-modal="newRxModal"><i class="fas fa-plus"></i> New Prescription</button></div>
        <div class="filters-bar"><input type="search" placeholder="Search..." id="tableSearch" style="min-width:200px;"><select><option>All Status</option><option>Confirmed</option><option>Pending</option><option>Completed</option><option>Cancelled</option></select><select><option>All Patients</option><option>Video Call</option><option>Follow-up</option></select><input type="date" value="2026-07-06"><button class="btn-primary-custom btn-sm-custom" onclick="PsyDost.showToast('Filters applied','info')"><i class="fas fa-filter"></i> Apply</button></div>
        <div class="card"><div class="card-body p-0"><table class="table-custom"><thead><tr><th>Date</th><th>Patient</th><th>Medication</th><th>Duration</th><th>Status</th><th>Actions</th></tr></thead><tbody><tr><td><strong>Jul 6, 2026</strong></td><td><div class="patient-cell"><img src="https://ui-avatars.com/api/?name=Ananya+Krishnan&size=32&background=f59e0b&color=fff" class="avatar avatar-sm" alt=""><div class="info"><h6>Ananya Krishnan</h6></div></div></td><td>Sertraline 50mg</td><td>30 days</td><td><span class="badge-status active">Active</span></td><td><button class="btn-outline-custom btn-sm-custom" onclick="PsyDost.showToast('Prescription sent','success')"><i class="fas fa-paper-plane"></i></button></td></tr><tr><td><strong>Jul 4, 2026</strong></td><td><div class="patient-cell"><img src="https://ui-avatars.com/api/?name=Rahul+Mehta&size=32&background=2563eb&color=fff" class="avatar avatar-sm" alt=""><div class="info"><h6>Rahul Mehta</h6></div></div></td><td>Fluoxetine 20mg</td><td>30 days</td><td><span class="badge-status completed">Completed</span></td><td><a href="consultation-details.html" class="btn-outline-custom btn-sm-custom">View</a></td></tr></tbody></table></div></div>
        <div class="pagination-custom"><span class="page-info">Showing 1-6 of 48 results</span><div class="page-buttons"><button class="page-btn"><i class="fas fa-chevron-left"></i></button><button class="page-btn active">1</button><button class="page-btn">2</button><button class="page-btn">3</button><button class="page-btn"><i class="fas fa-chevron-right"></i></button></div></div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="newRxModal"><div class="modal-content-custom"><div class="modal-header-custom"><h5>New Prescription</h5><button data-close-modal="newRxModal" style="background:none;border:none;font-size:1.25rem;cursor:pointer;">&times;</button></div><div class="modal-body-custom">
        <div class="mb-3"><label class="form-label-custom">Patient</label><select class="form-control-custom"><option>Ananya Krishnan</option><option>Rahul Mehta</option><option>Sneha Patel</option></select></div>
        <div class="mb-3"><label class="form-label-custom">Medication</label><input class="form-control-custom" placeholder="e.g. Sertraline 50mg"></div>
        <div class="mb-3"><label class="form-label-custom">Dosage Instructions</label><textarea class="form-control-custom" rows="2" placeholder="Once daily after food"></textarea></div>
        <div class="mb-3"><label class="form-label-custom">Duration</label><select class="form-control-custom"><option>15 days</option><option selected>30 days</option><option>60 days</option></select></div>
        </div><div class="modal-footer-custom"><button class="btn-outline-custom" data-close-modal="newRxModal">Cancel</button><button class="btn-primary-custom" onclick="PsyDost.showToast('Prescription created','success');PsyDost.closeModal('newRxModal')">Create</button></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="../js/layout.js"></script>
  <script src="../js/main.js"></script>
  
</body>
</html>
