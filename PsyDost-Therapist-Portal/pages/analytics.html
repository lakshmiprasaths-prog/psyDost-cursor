<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - PsyDost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body data-page="analytics.html">
  <div class="sidebar-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1035;opacity:0;pointer-events:none;transition:opacity .3s;"></div>
  <div class="app-wrapper">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-header"></div>
      <div class="page-content">
        <div class="breadcrumb-nav"> <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right" style="font-size:0.6rem;"></i> <span class="current">Analytics</span> </div>
        <div class="page-header"><div><h2>Analytics Dashboard</h2><p>Performance insights for Dr. Priya Sharma</p></div>
        <select class="form-control-custom" style="width:auto;"><option>Last 6 Months</option><option>Last 12 Months</option><option>This Year</option></select></div>
        <div class="kpi-grid"><div class="kpi-card"><div class="kpi-icon blue"><i class="fas fa-video"></i></div><span class="kpi-trend up"><i class="fas fa-arrow-up"></i> 18%</span><h3>624</h3><p>Total Consultations</p></div>
        <div class="kpi-card"><div class="kpi-icon green"><i class="fas fa-users"></i></div><span class="kpi-trend up"><i class="fas fa-arrow-up"></i> 8%</span><h3>248</h3><p>Active Patients</p></div>
        <div class="kpi-card"><div class="kpi-icon orange"><i class="fas fa-star"></i></div><h3>4.85</h3><p>Average Rating</p></div>
        <div class="kpi-card"><div class="kpi-icon purple"><i class="fas fa-percentage"></i></div><h3>92%</h3><p>Session Success Rate</p></div></div>
        <div class="row g-4 mb-4"><div class="col-lg-8"><div class="card"><div class="card-header"><h5>Revenue Growth</h5></div><div class="card-body"><div class="chart-container"><canvas id="revenueGrowthChart"></canvas></div></div></div></div>
        <div class="col-lg-4"><div class="card"><div class="card-header"><h5>Success Rate</h5></div><div class="card-body"><div class="chart-container"><canvas id="successRateChart"></canvas></div></div></div></div></div>
        <div class="row g-4"><div class="col-lg-6"><div class="card"><div class="card-header"><h5>Appointment Trends</h5></div><div class="card-body"><div class="chart-container"><canvas id="appointmentTrendsChart"></canvas></div></div></div></div>
        <div class="col-lg-6"><div class="card"><div class="card-header"><h5>Rating Trend</h5></div><div class="card-body"><div class="chart-container"><canvas id="ratingTrendChart"></canvas></div></div></div></div></div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/main.js"></script>
  
</body>
</html>
