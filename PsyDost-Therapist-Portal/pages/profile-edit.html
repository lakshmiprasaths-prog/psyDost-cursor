<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - PsyDost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body data-page="profile-edit.html">
  <div class="sidebar-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1035;opacity:0;pointer-events:none;transition:opacity .3s;"></div>
  <div class="app-wrapper">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-header"></div>
      <div class="page-content">
        <div class="breadcrumb-nav"> <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right" style="font-size:0.6rem;"></i> <a href="profile-view.html">Profile</a> <i class="fas fa-chevron-right" style="font-size:0.6rem;"></i> <span class="current">Edit</span> </div>
        <div class="page-header"><div><h2>Edit Profile</h2><p>Update your professional information</p></div></div>
        <form onsubmit="event.preventDefault();PsyDost.showToast('Profile updated successfully','success');setTimeout(()=>location.href='profile-view.html',1500)">
        <div class="row g-4"><div class="col-lg-8">
          <div class="card mb-4"><div class="card-header"><h5>Personal Information</h5></div><div class="card-body">
            <div class="text-center mb-4"><img src="https://ui-avatars.com/api/?name=Priya+Sharma&size=96&background=2563eb&color=fff" class="avatar-xl" alt=""><br><button type="button" class="btn-outline-custom btn-sm-custom mt-3" onclick="PsyDost.showToast('Photo upload coming soon','info')"><i class="fas fa-camera"></i> Upload Photo</button></div>
            <div class="row g-3"><div class="col-md-6"><label class="form-label-custom">Full Name</label><input class="form-control-custom" value="Dr. Priya Sharma"></div>
            <div class="col-md-6"><label class="form-label-custom">Email</label><input class="form-control-custom" type="email" value="dr.priya@psydost.com"></div>
            <div class="col-md-6"><label class="form-label-custom">Phone</label><input class="form-control-custom" value="+91 98765 43210"></div>
            <div class="col-md-6"><label class="form-label-custom">Location</label><input class="form-control-custom" value="Mumbai, Maharashtra"></div>
            <div class="col-12"><label class="form-label-custom">Bio</label><textarea class="form-control-custom" rows="4">Licensed clinical psychologist with 8+ years specializing in anxiety, depression, and trauma recovery across Mumbai and online.</textarea></div></div>
          </div></div>
          <div class="card mb-4"><div class="card-header"><h5>Professional Details</h5></div><div class="card-body">
            <div class="row g-3"><div class="col-md-6"><label class="form-label-custom">Qualification</label><input class="form-control-custom" value="M.Phil Clinical Psychology"></div>
            <div class="col-md-6"><label class="form-label-custom">RCI License No.</label><input class="form-control-custom" value="A12345"></div>
            <div class="col-md-6"><label class="form-label-custom">Experience (years)</label><input class="form-control-custom" type="number" value="8"></div>
            <div class="col-md-6"><label class="form-label-custom">Languages</label><input class="form-control-custom" value="English, Hindi, Marathi"></div>
            <div class="col-12"><label class="form-label-custom">Specializations</label><input class="form-control-custom" value="Anxiety, Depression, PTSD, Stress, Relationships"></div></div>
          </div></div>
          <div class="card"><div class="card-header"><h5>Consultation Fees</h5></div><div class="card-body">
            <div class="row g-3"><div class="col-md-4"><label class="form-label-custom">Initial Session (₹)</label><input class="form-control-custom" value="2000"></div>
            <div class="col-md-4"><label class="form-label-custom">Follow-up (₹)</label><input class="form-control-custom" value="1500"></div>
            <div class="col-md-4"><label class="form-label-custom">Couples Therapy (₹)</label><input class="form-control-custom" value="3000"></div></div>
          </div></div>
        </div>
        <div class="col-lg-4"><div class="card"><div class="card-body">
          <button type="submit" class="btn-primary-custom w-100 mb-2"><i class="fas fa-save"></i> Save Changes</button>
          <a href="profile-view.html" class="btn-outline-custom w-100" style="text-align:center;display:block;">Cancel</a>
        </div></div></div></div></form>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="../js/layout.js"></script>
  <script src="../js/main.js"></script>
  
</body>
</html>
